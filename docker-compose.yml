services:
  db:
    image: postgres:18
    container_name: eduflow-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eduflow}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-db-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eduflow"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./platform_backend
    container_name: eduflow-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:change-me-db-password@db:5432/eduflow}
      SECRET_KEY: ${SECRET_KEY:-replace-with-a-strong-32+char-secret}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://frontend:3000}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      BASE_URL: ${BASE_URL:-http://localhost:8000}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      RUN_SEED: ${RUN_SEED:-true}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./platform_frontend
    container_name: eduflow-frontend
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
      NEXT_PUBLIC_SITE_NAME: ${NEXT_PUBLIC_SITE_NAME:-Dynamic EduFlow}
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
