services:
  db:
    image: postgres:18
    container_name: eduflow-db
    environment:
      POSTGRES_DB: eduflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: george07
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eduflow"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./platform_backend
    container_name: eduflow-backend
    environment:
      DATABASE_URL: postgresql://postgres:george07@db:5432/eduflow
      SECRET_KEY: supersecretkey-change-this-in-production-must-be-32-chars-min
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      ALLOWED_ORIGINS: http://localhost:3000,http://frontend:3000
      UPLOAD_DIR: /app/uploads
      BASE_URL: http://localhost:8000
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./platform_frontend
    container_name: eduflow-frontend
    environment:
      BACKEND_URL: http://backend:8000
      NEXT_PUBLIC_SITE_NAME: Dynamic EduFlow
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
